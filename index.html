<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Wedding Invitation</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<article class="card" aria-label="Wedding invitation">
		<p class="ornament" aria-hidden="true">✦ ✦ ✦</p>
		<h1>Together with their families</h1>
		<p class="subtitle">request the pleasure of your company</p>
		<p class="names">Alex Morgan</p>
		<span class="and">&amp;</span>
		<p class="names">Jordan Lee</p>
		<hr>
		<p class="detail">Friday, the tenth of April</p>
		<p class="detail date">Two thousand and twenty-six</p>
		<p class="detail">at four o’clock in the afternoon</p>
		<p class="detail" style="margin-top: 1rem;">The Garden House</p>
		<p class="detail">123 Willow Lane, Springfield</p>
		<p class="footer">Reception to follow</p>
	</article>
</body>
</html>
